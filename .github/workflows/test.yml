name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 仅 22.x：Node 20/24 的 `node --test` 在进程内 HTTP server + fetch 下有
        # worker 序列化 quirk("Unable to deserialize cloned data")，与本套件逻辑无关。
        # 22.x 是本项目开发/验证版本。
        node: [22.x]
    name: Tier 1 (Node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --version
      # 零依赖：无需 npm install。Tier 1 不需要 codex(e2e 默认 gated)。
      - run: npm test
